services:
  - type: web
    name: medbook-api
    env: python
    region: oregon
    plan: free

    buildCommand: >-
      pip install -r requirements/production.txt &&
      python manage.py collectstatic --noinput

    startCommand: >-
      python manage.py migrate --noinput &&
      python manage.py ensure_superuser &&
      gunicorn config.wsgi:application
      --bind 0.0.0.0:$PORT
      --workers 2
      --timeout 120

    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production

      - key: PYTHON_VERSION
        value: "3.12.0"

      # Render auto-genera un valor seguro
      - key: SECRET_KEY
        generateValue: true

      # Actualizar con el dominio real después del primer deploy
      - key: ALLOWED_HOSTS
        value: ".onrender.com"

      # Proveer manualmente en el dashboard de Render
      - key: DATABASE_URL
        sync: false

      - key: DEFAULT_FROM_EMAIL
        value: "MedBook <noreply@medbook.com>"

      # Emails van a los logs de Render — sin SMTP real
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.console.EmailBackend
